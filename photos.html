<script>
function toggleFloat(){
  var m=document.getElementById('float-menu');
  var o=document.getElementById('float-icon-open');
  var c=document.getElementById('float-icon-close');
  var btn=document.getElementById('float-toggle');
  var open=m.classList.toggle('open');
  m.setAttribute('aria-hidden', open ? 'false' : 'true');
  btn.setAttribute('aria-expanded', open ? 'true' : 'false');
  o.style.display=open?'none':'block';
  c.style.display=open?'block':'none';
}
document.addEventListener('click',function(e){
  var fc=document.getElementById('float-contact');
  if(fc&&!fc.contains(e.target)){
    var m=document.getElementById('float-menu');
    var o=document.getElementById('float-icon-open');
    var c=document.getElementById('float-icon-close');
    var btn=document.getElementById('float-toggle');
    if(m&&m.classList.contains('open')){
      m.classList.remove('open');
      m.setAttribute('aria-hidden','true');
      btn.setAttribute('aria-expanded','false');
      o.style.display='block';
      c.style.display='none';
    }
  }
});
</script>
