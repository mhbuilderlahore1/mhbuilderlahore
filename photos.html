<script>
function toggleFloat(){
  var m=document.getElementById('float-menu');
  var o=document.getElementById('float-icon-open');
  var c=document.getElementById('float-icon-close');
  var open=m.classList.toggle('open');
  o.style.display=open?'none':'block';
  c.style.display=open?'block':'none';
}
document.addEventListener('click',function(e){
  var fc=document.getElementById('float-contact');
  if(fc&&!fc.contains(e.target)){
    var m=document.getElementById('float-menu');
    var o=document.getElementById('float-icon-open');
    var c=document.getElementById('float-icon-close');
    if(m){m.classList.remove('open');o.style.display='block';c.style.display='none';}
  }
});
</script>
