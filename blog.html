<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Roboto',sans-serif; background:#1a1a1a; color:#e8e8e8; min-height:100vh; }

/* TOP BAR */
.topbar { background:#202124; display:flex; align-items:center; gap:12px; padding:14px 18px; position:sticky; top:0; z-index:100; border-bottom:1px solid #3c3c3c; }
.topbar img { width:38px; height:38px; border-radius:50%; flex-shrink:0; }
.topbar .brand { font-size:17px; font-weight:700; color:#fff; }
.topbar .brand span { color:#8ab4f8; }
.back-link { margin-left:auto; font-size:13px; color:#8ab4f8; text-decoration:underline; padding:10px 4px; display:flex; align-items:center; }

/* PAGE HEADER */
.page-header { background:#202124; padding:20px 18px 16px; border-bottom:1px solid #3c3c3c; }
.page-header h1 { font-size:24px; font-weight:700; color:#fff; }
.page-header p { font-size:13px; color:#b8bfc9; margin-top:4px; }

/* LAYOUT */
.layout { display:flex; gap:0; }

/* SIDEBAR */
.sidebar { width:260px; flex-shrink:0; background:#202124; border-right:1px solid #3c3c3c; min-height:calc(100vh - 120px); padding:16px 0; position:sticky; top:60px; max-height:calc(100vh - 60px); overflow-y:auto; }
.sidebar-title { font-size:13px; font-weight:600; color:#9aa0a6; padding:8px 18px 10px; letter-spacing:0.5px; text-transform:uppercase; }
.cat-item { display:flex; align-items:center; gap:10px; padding:11px 18px; cursor:pointer; color:#bdc1c6; font-size:14px; transition:all 0.15s; border:none; background:none; width:100%; text-align:left; }
.cat-item:hover { background:#303134; color:#e8e8e8; }
.cat-item.active { background:#1a3a6b; color:#8ab4f8; font-weight:500; }
.cat-count { margin-left:auto; font-size:11px; background:#303134; color:#9aa0a6; padding:2px 7px; border-radius:10px; }
.cat-item.active .cat-count { background:#2a4a8b; color:#8ab4f8; }

/* MAIN CONTENT */
.main { flex:1; min-width:0; padding:16px; }

/* SEARCH BAR */
.search-wrap { position:relative; margin-bottom:16px; }
.search-wrap input { width:100%; background:#303134; border:1px solid #5f6368; border-radius:24px; padding:11px 16px 11px 42px; color:#e8e8e8; font-size:14px; font-family:'Roboto',sans-serif; outline:none; transition:border-color 0.2s; }
.search-wrap input:focus { border-color:#8ab4f8; }
.search-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:#9aa0a6; font-size:16px; }

/* ACTIVE FILTER TAG */
.filter-tag { display:inline-flex; align-items:center; gap:8px; background:#1a3a6b; color:#8ab4f8; border-radius:16px; padding:6px 12px; font-size:13px; margin-bottom:14px; }
.filter-tag button { background:none; border:none; color:#8ab4f8; cursor:pointer; font-size:16px; line-height:1; padding:0; }

/* POSTS COUNT */
.posts-count { font-size:13px; color:#9aa0a6; margin-bottom:14px; }

/* POST LIST - Google style */
.post-item { padding:14px 0; border-bottom:1px solid #303134; cursor:pointer; transition:background 0.1s; }
.post-item:last-child { border-bottom:none; }
.post-item:hover { background:rgba(255,255,255,0.03); border-radius:8px; padding-left:8px; padding-right:8px; margin:0 -8px; }
.post-top { display:flex; gap:12px; align-items:flex-start; }
.post-thumb { width:80px; height:60px; border-radius:8px; object-fit:cover; flex-shrink:0; }
.post-body { flex:1; min-width:0; }
.post-cat-badge { display:inline-block; font-size:11px; color:#8ab4f8; background:#1a3a6b; padding:2px 8px; border-radius:10px; margin-bottom:6px; }
.post-title { font-size:15px; font-weight:600; color:#e8e8e8; line-height:1.35; margin-bottom:5px; }
.post-title:hover { color:#8ab4f8; text-decoration:underline; }
.post-summary { font-size:12px; color:#9aa0a6; line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.post-meta { display:flex; align-items:center; gap:12px; margin-top:8px; font-size:11px; color:#9aa0a6; }
.post-meta span { display:flex; align-items:center; gap:4px; }

/* LOADING / EMPTY */
.loading { text-align:center; padding:40px; color:#9aa0a6; font-size:14px; }
.empty-state { text-align:center; padding:50px 20px; color:#9aa0a6; }
.empty-state .icon { font-size:40px; margin-bottom:12px; }
.empty-state p { font-size:14px; }

/* MOBILE */
@media (max-width:640px) {
  .sidebar { display:none; }
  .mobile-cats { display:flex; gap:8px; overflow-x:auto; padding:12px 16px; scrollbar-width:none; background:#202124; border-bottom:1px solid #3c3c3c; }
  .mobile-cats::-webkit-scrollbar { display:none; }

  <button class="mobile-cat-btn active" onclick="filterCat('', this)">All Posts</button>
</div>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-title">Categories</div>
    <button class="cat-item active" onclick="filterCat('', this)" data-cat="">
      <span>🏗️ All Posts</span>
      <span class="cat-count" id="count-all">0</span>
    </button>
    <div id="catList"></div>
  </div>

  <!-- POSTS AREA -->
  <div class="main">
    <!-- SEARCH -->
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Post title ya category search karein..." oninput="onSearch()">
    </div>

    <!-- ACTIVE FILTER -->
    <div id="filterTag" style="display:none">
      <div class="filter-tag">
        <span id="filterLabel"></span>
        <button onclick="filterCat('', null)">✕</button>
      </div>
    </div>

    <!-- COUNT -->
    <div class="posts-count" id="postsCount"></div>

    <!-- POST LIST -->
    <div id="postList">
      <div class="loading">Posts load ho rahi hain...</div>
    </div>

<script>
let allPosts = [];
let activeCategory = '';
let searchQuery = '';

// GitHub raw URL — aap apna repo update karein
const POSTS_JSON_URL = './posts.json';

async function loadPosts() {
  try {
    const res = await fetch(POSTS_JSON_URL + '?v=' + Date.now());
    const data = await res.json();
    allPosts = data.posts || [];
    buildSidebar(data.categories || [], data.posts || []);
    renderPosts();
  } catch(e) {
    document.getElementById('postList').innerHTML = '<div class="loading">Posts load nahi ho sakeen. GitHub connection check karein.</div>';
  }
}

function buildSidebar(categories, posts) {
  // Count per category
  const counts = {};
  posts.forEach(p => { counts[p.category] = (counts[p.category] || 0) + 1; });
  
  document.getElementById('count-all').textContent = posts.length;

  const catList = document.getElementById('catList');
  const mobileCats = document.getElementById('mobileCats');

  const icons = {
    'Residential Building': '🏠',
    'Commercial Building': '🏢',
    'Renovation': '🔨',
    'Interior Designing': '🛋️',
    'Exterior Designing': '🏡',
    'Grey Structure': '🧱',
    'Drawing Plan': '📐',
    'Farmhouse': '🌿',
    'Tips & Advice': '💡'
  };

  categories.forEach(cat => {
    const count = counts[cat] || 0;
    const icon = icons[cat] || '📁';
    
    // Sidebar item
    const div = document.createElement('button');
    div.className = 'cat-item';
    div.setAttribute('data-cat', cat);
    div.onclick = function() { filterCat(cat, this); };
    div.innerHTML = `<span>${icon} ${cat}</span><span class="cat-count">${count}</span>`;
    catList.appendChild(div);

    // Mobile button
    const btn = document.createElement('button');
    btn.className = 'mobile-cat-btn';
    btn.setAttribute('data-cat', cat);
    btn.textContent = `${icon} ${cat}`;
    btn.onclick = function() { filterCat(cat, null); syncMobileCat(cat); };
    mobileCats.appendChild(btn);
  });
}

function syncMobileCat(cat) {
  document.querySelectorAll('.mobile-cat-btn').forEach(b => {
    const bCat = b.getAttribute('data-cat') || '';
    b.classList.toggle('active', bCat === cat);
  });
}

function filterCat(cat, clickedBtn) {
  activeCategory = cat;
  // Sidebar
  document.querySelectorAll('.cat-item').forEach(b => {
    b.classList.toggle('active', (b.getAttribute('data-cat') || '') === cat);
  });
  syncMobileCat(cat);
  renderPosts();
}

function onSearch() {
  searchQuery = document.getElementById('searchInput').value.trim().toLowerCase();
  renderPosts();
}

function renderPosts() {
  let filtered = allPosts;
  if (activeCategory) {
    filtered = filtered.filter(p => p.category === activeCategory);
  }
  if (searchQuery) {
    filtered = filtered.filter(p =>
      p.title.toLowerCase().includes(searchQuery) ||
      p.summary.toLowerCase().includes(searchQuery) ||
      p.category.toLowerCase().includes(searchQuery)
    );
  }

  // Filter tag
  const filterTag = document.getElementById('filterTag');
  const filterLabel = document.getElementById('filterLabel');
  if (activeCategory) {
    filterTag.style.display = 'block';
    filterLabel.textContent = '🏷️ ' + activeCategory;
  } else {
    filterTag.style.display = 'none';
  }

  // Count
  const countEl = document.getElementById('postsCount');
  countEl.textContent = filtered.length + ' post' + (filtered.length !== 1 ? 's' : '') + ' mile';

  const list = document.getElementById('postList');
  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>Koi post nahi mili.<br>Dusri category try karein.</p></div>`;
    return;
  }

  list.innerHTML = filtered.map(post => `
    <div class="post-item" onclick="openPost('${post.slug}')">
      <div class="post-top">
        <img class="post-thumb" src="${post.image}" alt="${post.title}" loading="lazy" onerror="this.style.display='none'">
        <div class="post-body">
          <span class="post-cat-badge">${post.category}</span>
          <div class="post-title">${post.title}</div>
          <div class="post-summary">${post.summary}</div>
          <div class="post-meta">
            <span>📅 ${formatDate(post.date)}</span>
            <span>⏱️ ${post.readTime} read</span>
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

function openPost(slug) {
  // Post page open karo — aap apne GitHub se post-${slug}.html bana sakte hain
  // Abhi ek placeholder page
  window.location.href = 'post.html?slug=' + slug;
}

function formatDate(dateStr) {
  const d = new Date(dateStr);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
}

loadPosts();
</script>
