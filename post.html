<!DOCTYPE html>
<html lang="ur" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#202124">
<title id="pageTitle">Post — Mhbuilder Lahore</title>
<meta name="description" id="pageDesc" content="Mhbuilder Lahore construction post — DHA Lahore specialist">
<link rel="canonical" id="pageCanon" href="https://mhbuilderlahore.site/post.html">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Roboto',sans-serif; background:#1a1a1a; color:#e8e8e8; min-height:100vh; }

.topbar { background:#202124; display:flex; align-items:center; gap:12px; padding:14px 18px; position:sticky; top:0; z-index:100; border-bottom:1px solid #3c3c3c; }
.topbar .brand { font-size:17px; font-weight:700; color:#fff; }
.topbar .brand span { color:#8ab4f8; }
.back-link { margin-left:auto; font-size:13px; color:#8ab4f8; text-decoration:underline; padding:10px 4px; }

.layout { display:flex; gap:0; max-width:1100px; margin:0 auto; }

/* SIDEBAR */
.sidebar { width:240px; flex-shrink:0; background:#202124; border-right:1px solid #3c3c3c; min-height:calc(100vh - 60px); padding:16px 0; position:sticky; top:60px; max-height:calc(100vh - 60px); overflow-y:auto; }
.sb-title { font-size:11px; font-weight:600; color:#9aa0a6; padding:6px 16px 10px; letter-spacing:0.5px; text-transform:uppercase; }
.sb-cat { display:flex; align-items:center; justify-content:space-between; padding:10px 16px; cursor:pointer; color:#bdc1c6; font-size:13px; border:none; background:none; width:100%; text-align:left; text-decoration:none; }
.sb-cat:hover { background:#303134; color:#e8e8e8; }
.sb-cat.active { background:#1a3a6b; color:#8ab4f8; font-weight:500; }
.sb-badge { font-size:10px; background:#303134; color:#9aa0a6; padding:1px 6px; border-radius:8px; }

/* MAIN */
.main { flex:1; min-width:0; padding:20px 16px; }

/* POST CONTENT */
.post-header { margin-bottom:18px; }
.post-cat-badge { display:inline-block; font-size:12px; color:#8ab4f8; background:#1a3a6b; padding:3px 10px; border-radius:10px; margin-bottom:10px; }
.post-header h1 { font-size:22px; font-weight:700; color:#fff; line-height:1.3; margin-bottom:8px; }
.post-meta { font-size:12px; color:#9aa0a6; display:flex; gap:14px; flex-wrap:wrap; margin-bottom:14px; }
.post-hero { width:100%; border-radius:10px; object-fit:cover; max-height:280px; margin-bottom:18px; background:#303134; }
.post-body { font-size:14px; color:#bdc1c6; line-height:1.75; }
.post-body h2 { font-size:17px; color:#e8e8e8; margin:20px 0 8px; }
.post-body h3 { font-size:15px; color:#e8e8e8; margin:16px 0 6px; }
.post-body p { margin-bottom:12px; }
.post-body ul, .post-body ol { padding-left:22px; margin-bottom:12px; }
.post-body li { margin-bottom:6px; }
.post-body strong { color:#e8e8e8; }
.post-body a { color:#8ab4f8; }

/* RELATED */
.related-title { font-size:15px; font-weight:600; color:#e8e8e8; margin:28px 0 12px; padding-bottom:8px; border-bottom:1px solid #3c3c3c; }
.rel-item { display:flex; gap:10px; padding:10px 0; border-bottom:1px solid #2c2c2c; cursor:pointer; }
.rel-item:hover .rel-title { color:#8ab4f8; text-decoration:underline; }
.rel-thumb { width:64px; height:48px; border-radius:6px; object-fit:cover; flex-shrink:0; background:#303134; }
.rel-title { font-size:13px; font-weight:600; color:#e8e8e8; line-height:1.3; }
.rel-cat { font-size:11px; color:#9aa0a6; margin-top:3px; }

/* NOT FOUND */
.not-found { text-align:center; padding:60px 20px; color:#9aa0a6; }
.not-found .icon { font-size:48px; margin-bottom:14px; }
.not-found h2 { font-size:20px; color:#e8e8e8; margin-bottom:8px; }

/* CTA */
.cta-box { background:#202124; border:1px solid #3c3c3c; border-radius:10px; padding:18px; margin-top:28px; text-align:center; }
.cta-box h3 { color:#fff; font-size:16px; margin-bottom:8px; }
.cta-box p { color:#9aa0a6; font-size:13px; margin-bottom:14px; }
.cta-btn { display:inline-flex; align-items:center; gap:6px; background:#25D366; color:#fff; padding:10px 20px; border-radius:20px; text-decoration:none; font-size:14px; font-weight:500; }

@media (max-width:600px) {
  .sidebar { display:none; }
  .main { padding:14px; }
  .post-header h1 { font-size:18px; }
}

footer { background:#202124; text-align:center; padding:20px; font-size:12px; color:#9aa0a6; border-top:1px solid #3c3c3c; margin-top:10px; }
footer a { color:#8ab4f8; text-decoration:none; }
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" style="font-size:22px; text-decoration:none;">🏗️</a>
  <div class="brand">Mh<span>builder</span></div>
  <a class="back-link" href="blog.html">← Back to Blog</a>
</div>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sb-title">Categories</div>
    <a class="sb-cat" href="blog.html">🏗️ All Posts</a>
    <div id="sbCats"></div>
    <div style="margin-top:20px; padding:12px 16px; border-top:1px solid #3c3c3c;">
      <div style="font-size:11px; color:#9aa0a6; margin-bottom:8px; text-transform:uppercase; letter-spacing:0.5px;">Contact Us</div>
      <a href="https://wa.me/923019492494" style="display:block; font-size:13px; color:#25D366; text-decoration:none; margin-bottom:6px;">💬 WhatsApp</a>
      <a href="tel:+923019492494" style="display:block; font-size:13px; color:#8ab4f8; text-decoration:none;">📞 Call Now</a>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main" id="mainContent">
    <div style="text-align:center; padding:40px; color:#9aa0a6;">Loading post...</div>
  </div>

</div>

<footer>
  <p>© 2026 Mhbuilder Lahore · DHA Phase 8 Broadway, Lahore</p>
  <p style="margin-top:6px;"><a href="index.html">Home</a> · <a href="blog.html">Blog</a> · <a href="tel:+923019492494">Call</a> · <a href="https://wa.me/923019492494">WhatsApp</a></p>
</footer>

<script>
// Get slug from URL
const params = new URLSearchParams(window.location.search);
const slug = params.get('slug') || '';

const icons = {'Residential Building':'🏠','Commercial Building':'🏢','Renovation':'🔨','Interior Designing':'🛋️','Exterior Designing':'🏡','Grey Structure':'🧱','Drawing Plan':'📐','Farmhouse':'🌿','Tips & Advice':'💡'};

async function loadPost() {
  try {
    const r = await fetch('./posts.json?v=' + Date.now());
    const d = await r.json();
    const post = (d.posts || []).find(p => p.slug === slug);

    // Build sidebar
    const sbCats = document.getElementById('sbCats');
    const counts = {};
    (d.posts||[]).forEach(p => counts[p.category] = (counts[p.category]||0)+1);
    (d.categories||[]).forEach(cat => {
      const a = document.createElement('a');
      a.className = 'sb-cat';
      a.href = 'blog.html?cat=' + encodeURIComponent(cat);
      if (post && post.category === cat) a.className += ' active';
      a.innerHTML = `${icons[cat]||'📁'} ${cat} <span class="sb-badge">${counts[cat]||0}</span>`;
      sbCats.appendChild(a);
    });

    if (!post) { showNotFound(); return; }

    // Update meta
    document.getElementById('pageTitle').textContent = post.title + ' — Mhbuilder Lahore';
    document.getElementById('pageDesc').content = post.summary;
    document.getElementById('pageCanon').href = 'https://mhbuilderlahore.site/post.html?slug=' + post.slug;

    // Related posts (same category, not current)
    const related = (d.posts||[]).filter(p => p.category === post.category && p.slug !== post.slug).slice(0,3);

    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const pd = new Date(post.date);
    const dateStr = pd.getDate() + ' ' + months[pd.getMonth()] + ' ' + pd.getFullYear();

    // Build full post body (from posts.json body field or fallback to summary)
    const bodyHtml = post.body || `<p>${post.summary}</p>
<p>For more information about this post, WhatsApp or call us. Mhbuilder Lahore has been providing excellent construction and designing services in Lahore for 25+ years.</p>
<h2>Our Services</h2>
<ul>
  <li>Residential & Commercial Building</li>
  <li>Grey Structure & Renovation</li>
  <li>Interior & Exterior Designing</li>
  <li>Drawing Plan & Consultation</li>
</ul>`;

    document.getElementById('mainContent').innerHTML = `
      <div class="post-header">
        <span class="post-cat-badge">${icons[post.category]||'📁'} ${post.category}</span>
        <h1>${post.title}</h1>
        <div class="post-meta">
          <span>📅 ${dateStr}</span>
          <span>⏱️ ${post.readTime} read</span>
        </div>
      </div>
      <img class="post-hero" src="${post.image}" alt="${post.title}" onerror="this.style.display='none'">
      <div class="post-body">${bodyHtml}</div>

      <div class="cta-box">
        <h3>🏗️ Your Construction Project Ready?</h3>
        <p>Mhbuilder Lahore — 25+ Years of Experience. Contact us today for a free site visit and estimate.</p>
        <a class="cta-btn" href="https://wa.me/923019492494?text=Hello+Mhbuilder,+I+need+information+about+${encodeURIComponent(post.category)}" target="_blank">💬 Chat on WhatsApp</a>
      </div>

      ${related.length ? `
      <div class="related-title">📌 Related Posts — ${post.category}</div>
      ${related.map(rp => {
        const rd = new Date(rp.date);
        return `<div class="rel-item" onclick="location.href='post.html?slug=${rp.slug}'">
          <img class="rel-thumb" src="${rp.image}" alt="" loading="lazy" onerror="this.style.display='none'">
          <div>
            <div class="rel-title">${rp.title}</div>
            <div class="rel-cat">${icons[rp.category]||''} ${rp.category} · ${rd.getDate()} ${months[rd.getMonth()]} ${rd.getFullYear()}</div>
          </div>
        </div>`;
      }).join('')}` : ''}
    `;
  } catch(e) {
    document.getElementById('mainContent').innerHTML = '<div class="not-found"><div class="icon">⚠️</div><h2>Could not load post</h2><p>Please check your network connection.</p></div>';
  }
}

function showNotFound() {
  document.getElementById('mainContent').innerHTML = `
    <div class="not-found">
      <div class="icon">🔍</div>
      <h2>Post Not Found</h2>
      <p>This post is not available or has been deleted.</p>
      <a href="blog.html" style="color:#8ab4f8; font-size:14px; margin-top:16px; display:inline-block;">← Back to Blog</a>
    </div>`;
}

loadPost();
</script>
</body>
</html>
