<script>
// Get slug from URL
const params = new URLSearchParams(window.location.search);
const slug = params.get('slug') || '';

const icons = {'Residential Building':'🏠','Commercial Building':'🏢','Renovation':'🔨','Interior Designing':'🛋️','Exterior Designing':'🏡','Grey Structure':'🧱','Drawing Plan':'📐','Farmhouse':'🌿','Tips & Advice':'💡'};

async function loadPost() {
  try {
    const r = await fetch('./posts.json?v=' + Date.now());
    const d = await r.json();
    const post = (d.posts || []).find(p => p.slug === slug);

    // Build sidebar
    const sbCats = document.getElementById('sbCats');
    const counts = {};
    (d.posts||[]).forEach(p => counts[p.category] = (counts[p.category]||0)+1);
    (d.categories||[]).forEach(cat => {
      const a = document.createElement('a');
      a.className = 'sb-cat';
      a.href = 'blog.html?cat=' + encodeURIComponent(cat);
      if (post && post.category === cat) a.className += ' active';
      a.innerHTML = `${icons[cat]||'📁'} ${cat} <span class="sb-badge">${counts[cat]||0}</span>`;
      sbCats.appendChild(a);
    });

    if (!post) { showNotFound(); return; }

    // Update meta
    document.getElementById('pageTitle').textContent = post.title + ' — Mhbuilder Lahore';
    document.getElementById('pageDesc').content = post.summary;
    document.getElementById('pageCanon').href = 'https://mhbuilderlahore.site/post.html?slug=' + post.slug;

    // Related posts (same category, not current)
    const related = (d.posts||[]).filter(p => p.category === post.category && p.slug !== post.slug).slice(0,3);

    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const pd = new Date(post.date);
    const dateStr = pd.getDate() + ' ' + months[pd.getMonth()] + ' ' + pd.getFullYear();

    // Build full post body (from posts.json body field or fallback to summary)
    const bodyHtml = post.body || `<p>${post.summary}</p>
<p>Is post ke baare mein zyada maloomat ke liye hamein WhatsApp karein ya call karein. Mhbuilder Lahore 25+ saalon se Lahore mein construction aur designing ki behtar khidmaat pesh kar raha hai.</p>
<h2>Hamari Khidmaat</h2>
<ul>
  <li>Residential & Commercial Building</li>
  <li>Grey Structure & Renovation</li>
  <li>Interior & Exterior Designing</li>
  <li>Drawing Plan & Consultation</li>
</ul>`;

    document.getElementById('mainContent').innerHTML = `
      <div class="post-header">
        <span class="post-cat-badge">${icons[post.category]||'📁'} ${post.category}</span>
        <h1>${post.title}</h1>
        <div class="post-meta">
          <span>📅 ${dateStr}</span>
          <span>⏱️ ${post.readTime} read</span>
        </div>
      </div>
      <img class="post-hero" src="${post.image}" alt="${post.title}" onerror="this.style.display='none'">
      <div class="post-body">${bodyHtml}</div>

      <div class="cta-box">
        <h3>🏗️ Aapka Construction Project Ready Hai?</h3>
        <p>Mhbuilder Lahore — 25+ saal ka tajurba. Free consultation ke liye abhi rabta karein.</p>
        <a class="cta-btn" href="https://wa.me/923019492494?text=Assalam+o+Alaikum+Mhbuilder,+mujhe+${encodeURIComponent(post.category)}+ke+baare+mein+maloomat+chahiye" target="_blank">💬 WhatsApp Par Baat Karein</a>
      </div>

      ${related.length ? `
      <div class="related-title">📌 Related Posts — ${post.category}</div>
      ${related.map(rp => {
        const rd = new Date(rp.date);
        return `<div class="rel-item" onclick="location.href='post.html?slug=${rp.slug}'">
          <img class="rel-thumb" src="${rp.image}" alt="" loading="lazy" onerror="this.style.display='none'">
          <div>
            <div class="rel-title">${rp.title}</div>
            <div class="rel-cat">${icons[rp.category]||''} ${rp.category} · ${rd.getDate()} ${months[rd.getMonth()]} ${rd.getFullYear()}</div>
          </div>
        </div>`;
      }).join('')}` : ''}
    `;
  } catch(e) {
    document.getElementById('mainContent').innerHTML = '<div class="not-found"><div class="icon">⚠️</div><h2>Load nahi ho saka</h2><p>Network check karein.</p></div>';
  }
}

function showNotFound() {
  document.getElementById('mainContent').innerHTML = `
    <div class="not-found">
      <div class="icon">🔍</div>
      <h2>Post nahi mili</h2>
      <p>Yeh post available nahi hai ya delete ho gayi hai.</p>
      <a href="blog.html" style="color:#8ab4f8; font-size:14px; margin-top:16px; display:inline-block;">← Blog par wapas jayein</a>
    </div>`;
}

loadPost();
</script>

<script>
function toggleFloat(){
  var m=document.getElementById('float-menu');
  var o=document.getElementById('float-icon-open');
  var c=document.getElementById('float-icon-close');
  var open=m.classList.toggle('open');
  o.style.display=open?'none':'block';
  c.style.display=open?'block':'none';
}
document.addEventListener('click',function(e){
  var fc=document.getElementById('float-contact');
  if(fc&&!fc.contains(e.target)){
    var m=document.getElementById('float-menu');
    var o=document.getElementById('float-icon-open');
    var c=document.getElementById('float-icon-close');
    if(m){m.classList.remove('open');o.style.display='block';c.style.display='none';}
  }
});
</script>
